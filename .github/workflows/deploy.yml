name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NEXT_PUBLIC_BASE_PATH: /SemperAdminPortal

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        # npm ci alone hits npm issue 4828: a package-lock.json generated on
        # Windows omits Linux-only optional native binaries (lightningcss,
        # sharp). The follow-up install forces those binaries onto the
        # ubuntu-latest runner without touching the lockfile.
        run: |
          npm ci --include=optional
          npm install --no-save --include=optional --force lightningcss-linux-x64-gnu @img/sharp-linux-x64

      - name: Security audit (production, blocking)
        run: npm audit --audit-level=moderate --omit=dev

      - name: Security audit (dev, advisory only)
        run: npm audit --audit-level=high || echo "dev advisories noted, non-blocking"

      - name: Secret scan
        run: |
          # Fail if any file contains patterns that look like hardcoded secrets.
          # Excludes node_modules, .next, out, and lock files.
          if grep -rE \
            '(api_key|apikey|secret|password|token|private_key)\s*[:=]\s*["'"'"'][A-Za-z0-9+/]{16,}["'"'"']' \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=out \
            .; then
            echo "Possible hardcoded secret detected. Review before merging."
            exit 1
          fi

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build static site
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: out/sbom.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the SBOM (keyless, Sigstore)
        run: cosign sign-blob --yes --output-signature out/sbom.cdx.json.sig out/sbom.cdx.json
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            out/sbom.cdx.json
            out/sbom.cdx.json.sig
          retention-days: 90

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
