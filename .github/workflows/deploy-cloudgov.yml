name: Deploy to Cloud.gov

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --include=optional
          npm install --no-save --include=optional --force lightningcss-linux-x64-gnu @img/sharp-linux-x64 @tailwindcss/oxide-linux-x64-gnu @tailwindcss/oxide-linux-x64-musl

      - name: Type check
        run: npm run type-check

      - name: Build for Cloud.gov
        run: npm run build
        env:
          DEPLOY_TARGET: cloudgov

      - name: Copy Staticfile
        run: cp deploy/Staticfile out/Staticfile

      - name: Install Cloud Foundry CLI
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf-cli
          cf --version

      - name: Authenticate with Cloud.gov
        run: |
          cf login -a api.fr.cloud.gov \
            -u "${{ secrets.CF_USERNAME }}" \
            -p "${{ secrets.CF_PASSWORD }}" \
            -o "${{ secrets.CF_ORG }}" \
            -s "${{ secrets.CF_SPACE }}"

      - name: Deploy to Cloud.gov
        run: cf push

      - name: Verify deployment
        run: |
          echo "✅ Deployment complete"
          cf app semper-admin-portal
