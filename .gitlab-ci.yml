# Scheduled mirror sync: GitHub into this GitLab project.
# web.git.mil exposes no Pull mirror direction, so this job replaces it.
# It runs on a pipeline schedule only, clones the public GitHub repo, and
# force-pushes every branch and tag into this GitLab project.
#
# This file lives in the GitHub repo, the source of truth, so it survives
# each overwrite and flows back down on every sync.
#
# Setup, one time:
#   1. Create a Project Access Token: Settings, Access Tokens.
#      Role Maintainer, scope write_repository. Copy the value.
#   2. Add a CI/CD variable: Settings, CI/CD, Variables.
#      Key GITLAB_SYNC_TOKEN, value the token, Masked on, Protected on
#      if main is a protected branch.
#   3. Create a schedule: Settings, CI/CD, Pipeline schedules.
#      Example cron "0 * * * *" for hourly. Run it once to test runner egress.

sync-from-github:
  stage: .pre
  image: alpine/git:latest
  variables:
    GIT_STRATEGY: none
    GITHUB_REPO: "https://github.com/SemperAdmin/SemperAdminPortal.git"
    GITLAB_HOST_PATH: "web.git.mil/semper_admin/SemperAdminPortal.git"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - git clone --bare "$GITHUB_REPO" mirror.git
    - cd mirror.git
    - git push --prune "https://sync:${GITLAB_SYNC_TOKEN}@${GITLAB_HOST_PATH}" "+refs/heads/*:refs/heads/*" "+refs/tags/*:refs/tags/*" -o ci.skip
